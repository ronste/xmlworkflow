version: "3.6"

services:
  xmlContainer:
    image: "sspworkflow:latest"
    stdin_open: true # docker run -i
    tty: true        # docker run -t
    container_name: "sspworkflow"
    hostname: "sspworkflow"
    ports:
      - "${HTTP_PORT:-8080}:80" # for future extensions
    volumes:
      - ./utils:/root/sspworkflow/utils
      - ./themes:/root/sspworkflow/themes
      - ./work:/root/sspworkflow/work
      - ./justfile:/root/sspworkflow/justfile
      - ./.env:/root/sspworkflow/.env
      - ./utils/mml2chtml-page:/root/sspworkflow/lib/mml2chtml-page
      - ./justfiles:/root/sspworkflow/justfiles
      - ./store:/root/sspworkflow/store